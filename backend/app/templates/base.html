<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T6 Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="header">
        <div class="header-content" style="position: relative; display: flex; align-items: center;">
            <h1 class="logo" style="position: absolute; left: 50%; transform: translateX(-50%);">T6 Admin</h1>
            <button class="btn btn-small" onclick="updateApiKey()" title="Сменить API Key" style="margin-left: auto;">🔑</button>
        </div>
    </header>
    <main class="main">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
