{% extends "base.html" %}

{% block content %}
<div class="chat-container">
    <div class="chat-header">
        <h2>Чат с AI</h2>
        <div class="chat-controls">
            <select id="provider-select" class="provider-select" onchange="onProviderChange()">
                <option value="">По умолчанию</option>
            </select>
            <select id="model-select" class="model-select" disabled>
                <option value="">Выберите модель</option>
            </select>
            <button class="btn btn-icon" onclick="loadModels()" title="Обновить модели">↻</button>
            <label class="debug-toggle">
                <input type="checkbox" id="debug-toggle" onchange="toggleDebug()">
                <span>Debug</span>
            </label>
            <label class="debug-toggle">
                <input type="checkbox" id="stream-toggle" checked>
                <span>Stream</span>
            </label>
            <button class="btn btn-secondary" onclick="resetChat()" title="Сбросить чат">🗑️</button>
        </div>
    </div>

    <div class="chat-stats" id="chat-stats" style="display: none;">
        <span id="tokens-info"></span>
    </div>

    <div class="chat-messages" id="chat-messages">
        <div class="message message-system">
            <div class="message-content">
                Привет! Я AI-ассистент. Задайте мне вопрос.
            </div>
        </div>
    </div>

    <form class="chat-input-form" id="chat-form">
        <div class="input-wrapper">
            <textarea 
                id="message-input" 
                class="message-input" 
                placeholder="Введите сообщение..." 
                rows="1"
                required
            ></textarea>
            <button type="submit" class="btn btn-primary" id="send-btn">Отправить</button>
        </div>
    </form>
</div>

<div id="debug-modal" class="modal" style="display: none;">
    <div class="modal-content debug-modal-content">
        <h3>Debug Info</h3>
        <div class="debug-tabs">
            <button class="debug-tab active" data-tab="request" onclick="switchDebugTab('request')">Request</button>
            <button class="debug-tab" data-tab="response" onclick="switchDebugTab('response')">Response</button>
        </div>
        <div class="debug-content">
            <pre id="debug-json"></pre>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeDebugModal()">Закрыть</button>
            <button class="btn btn-secondary" onclick="clearDebugData()">Очистить debug</button>
        </div>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chat-messages');
    const chatForm = document.getElementById('chat-form');
    const messageInput = document.getElementById('message-input');
    const providerSelect = document.getElementById('provider-select');
    const modelSelect = document.getElementById('model-select');
    let debugMode = localStorage.getItem('t6_debug') === 'true';
    let currentDebugData = null;
    let currentTotalInput = 0;
    let currentTotalOutput = 0;
    let currentTotalTokens = 0;
    let abortController = null;
    let isRequestInProgress = false;

    document.getElementById('send-btn').addEventListener('click', function(e) {
        if (isRequestInProgress && abortController) {
            e.preventDefault();
            abortController.abort();
        }
    });

    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('debug-toggle').checked = debugMode;
    });

    function toggleDebug() {
        debugMode = document.getElementById('debug-toggle').checked;
        localStorage.setItem('t6_debug', debugMode ? 'true' : 'false');
    }

    function showDebugModal(debugData) {
        currentDebugData = debugData;
        const hasRequest = debugData.request;
        const hasResponse = debugData.response;
        
        document.querySelectorAll('.debug-tab').forEach(t => {
            t.style.display = (hasRequest && hasResponse) ? '' : 'none';
        });
        
        if (hasResponse && !hasRequest) {
            document.getElementById('debug-json').textContent = JSON.stringify(debugData.response, null, 2);
            document.querySelectorAll('.debug-tab').forEach(t => t.classList.remove('active'));
            document.querySelector('.debug-tab[data-tab="response"]').classList.add('active');
        } else {
            document.getElementById('debug-json').textContent = JSON.stringify(debugData.request, null, 2);
            document.querySelectorAll('.debug-tab').forEach(t => t.classList.remove('active'));
            document.querySelector('.debug-tab[data-tab="request"]').classList.add('active');
        }
        document.getElementById('debug-modal').style.display = 'flex';
    }

    function switchDebugTab(tab) {
        document.querySelectorAll('.debug-tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.debug-tab[data-tab="${tab}"]`).classList.add('active');
        
        if (currentDebugData) {
            const data = tab === 'request' ? currentDebugData.request : currentDebugData.response;
            document.getElementById('debug-json').textContent = JSON.stringify(data, null, 2);
        }
    }

    function closeDebugModal() {
        document.getElementById('debug-modal').style.display = 'none';
    }

    function clearDebugData() {
        const sessionId = getSessionId();
        fetch(`/api/sessions/${sessionId}/clear-debug`, { method: 'POST' })
            .then(() => {
                document.querySelectorAll('.message-debug-btn').forEach(btn => btn.remove());
                closeDebugModal();
                location.reload();
            })
            .catch(err => console.error('Failed to clear debug:', err));
    }

    function getSessionId() {
        return localStorage.getItem('t6_session_id') || 'default';
    }

    async function loadProviders() {
        try {
            const response = await fetch('/api/admin/config');
            if (response.ok) {
                const data = await response.json();
                const providers = data.providers || {};
                
                providerSelect.innerHTML = '<option value="">По умолчанию</option>';
                for (const name of Object.keys(providers)) {
                    const option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    providerSelect.appendChild(option);
                }
                
                if (data.default_provider) {
                    providerSelect.value = data.default_provider;
                }
                
                await loadModels();
                await loadUserSettings();
            }
        } catch (err) {
            console.error('Failed to load providers:', err);
        }
    }

    async function loadModels() {
        const provider = providerSelect.value;
        if (!provider) {
            modelSelect.innerHTML = '<option value="">Выберите провайдер</option>';
            modelSelect.disabled = true;
            return;
        }

        modelSelect.disabled = true;
        modelSelect.innerHTML = '<option value="">Загрузка...</option>';

        try {
            const response = await fetch(`/api/admin/providers/${provider}/models`);
            if (response.ok) {
                const data = await response.json();
                
                if (data.models && data.models.length > 0) {
                    modelSelect.innerHTML = '<option value="">По умолчанию</option>';
                    data.models.forEach(model => {
                        const option = document.createElement('option');
                        option.value = model;
                        option.textContent = model;
                        modelSelect.appendChild(option);
                    });
                    modelSelect.disabled = false;
                } else {
                    modelSelect.innerHTML = '<option value="">Нет доступных моделей</option>';
                }
            } else {
                const errorData = await response.json();
                modelSelect.innerHTML = `<option value="">Ошибка: ${errorData.error || 'Unknown'}</option>`;
            }
        } catch (err) {
            modelSelect.innerHTML = '<option value="">Ошибка загрузки</option>';
        }
    }

    async function onProviderChange() {
        await loadModels();
    }

    async function loadUserSettings() {
        try {
            const response = await fetch('/api/user/settings');
            if (response.ok) {
                const data = await response.json();
                if (data.provider) {
                    providerSelect.value = data.provider;
                }
                await loadModels();
                if (data.model) {
                    modelSelect.value = data.model;
                }
            }
        } catch (err) {
            console.error('Failed to load user settings:', err);
        }
    }

    async function saveUserSettings() {
        const provider = providerSelect.value;
        const model = modelSelect.value;
        
        try {
            await fetch('/api/user/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ provider, model })
            });
        } catch (err) {
            console.error('Failed to save user settings:', err);
        }
    }

    async function loadMessages() {
        const sessionId = getSessionId();
        try {
            const response = await fetch(`/api/sessions/${sessionId}/messages`);
            const data = await response.json();
            
            chatMessages.innerHTML = '';
            
            const messages = data.messages || [];
            if (messages.length === 0) {
                chatMessages.innerHTML = `
                    <div class="message message-system">
                        <div class="message-content">
                            Привет! Я AI-ассистент. Задайте мне вопрос.
                        </div>
                    </div>
                `;
                updateStats(0, 0, 0);
                return;
            }
            
            let totalInput = 0;
            let totalOutput = 0;
            currentTotalInput = 0;
            currentTotalOutput = 0;
            currentTotalTokens = 0;
            
            messages.forEach(msg => {
                addMessage(msg.content, msg.role, msg.debug || null, msg.usage || null, msg.model || null);
                if (msg.usage) {
                    totalInput += msg.usage.input_tokens || 0;
                    totalOutput += msg.usage.output_tokens || 0;
                }
            });
            
            currentTotalInput = totalInput;
            currentTotalOutput = totalOutput;
            currentTotalTokens = totalInput + totalOutput;
            updateStats(currentTotalInput, currentTotalOutput, currentTotalTokens);
        } catch (err) {
            console.error('Failed to load messages:', err);
        }
    }

    function updateStats(inputTokens, outputTokens, totalTokens) {
        const statsEl = document.getElementById('chat-stats');
        const tokensInfo = document.getElementById('tokens-info');
        if (totalTokens > 0 || inputTokens > 0 || outputTokens > 0) {
            statsEl.style.display = 'block';
            let text = '';
            if (inputTokens > 0) text += `Вход: ${inputTokens} | `;
            if (outputTokens > 0) text += `Выход: ${outputTokens} | `;
            text += `Всего: ${totalTokens}`;
            tokensInfo.textContent = text;
        } else {
            statsEl.style.display = 'none';
        }
    }

    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const message = messageInput.value.trim();
        if (!message) return;

        const sendBtn = document.getElementById('send-btn');
        const streamToggle = document.getElementById('stream-toggle');
        const useStream = streamToggle.checked;

        isRequestInProgress = true;
        abortController = new AbortController();
        
        sendBtn.textContent = 'Стоп';
        messageInput.disabled = true;

        addMessage(message, 'user');

        const provider = providerSelect.value || null;
        const model = modelSelect.value || null;
        const sessionId = getSessionId();
        
        try {
            if (useStream) {
                await sendStreamMessage(message, provider, model, sessionId, sendBtn);
            } else {
                await sendRegularMessage(message, provider, model, sessionId, sendBtn);
            }
        } finally {
            messageInput.value = '';
            messageInput.disabled = false;
            sendBtn.disabled = false;
            sendBtn.textContent = 'Отправить';
            isRequestInProgress = false;
            abortController = null;
        }
    });

    async function sendRegularMessage(message, provider, model, sessionId, sendBtn) {
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Session-Id': sessionId,
                },
                signal: abortController ? abortController.signal : null,
                body: JSON.stringify({ message, provider, model, debug: debugMode })
            });

            const data = await response.json();

            if (data.error) {
                messageInput.value = message;
                const errorDebug = (data.error_type === 'context_length_exceeded' && data.debug) ? data.debug : null;
                addMessage('Ошибка: ' + data.error, 'error', errorDebug, null, data.model || null);
            } else {
                const usage = data.usage || null;
                addMessage(data.message, 'assistant', data.debug || null, usage, data.model || null);
                if (data.usage) {
                    const inputTokens = data.usage.input_tokens || 0;
                    const outputTokens = data.usage.output_tokens || 0;
                    const totalTokens = data.usage.total_tokens || (inputTokens + outputTokens);
                    currentTotalInput += inputTokens;
                    currentTotalOutput += outputTokens;
                    currentTotalTokens += totalTokens;
                    updateStats(currentTotalInput, currentTotalOutput, currentTotalTokens);
                }
                saveUserSettings();
            }
        } catch (err) {
            if (err.name === 'AbortError') {
                addMessage('Запрос прерван', 'error');
                return;
            }
            messageInput.value = message;
            addMessage('Ошибка соединения: ' + err.message, 'error');
        }
    }

    async function sendStreamMessage(message, provider, model, sessionId, sendBtn) {
        let assistantDiv = null;
        let messageContent = null;

        try {
            const response = await fetch('/api/chat/stream', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Session-Id': sessionId,
                },
                signal: abortController ? abortController.signal : null,
                body: JSON.stringify({ message, provider, model, debug: debugMode })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let fullContent = '';

            assistantDiv = document.createElement('div');
            assistantDiv.className = 'message message-assistant';
            messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            messageContent.innerHTML = '';
            assistantDiv.appendChild(messageContent);
            chatMessages.appendChild(assistantDiv);

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const dataStr = line.slice(6);
                        if (dataStr === '[DONE]') continue;

                        try {
                            const data = JSON.parse(dataStr);

                            if (data.error) {
                                messageInput.value = message;
                                assistantDiv.remove();
                                const errorDebug = (data.error_type === 'context_length_exceeded' && data.debug) ? data.debug : null;
                                addMessage('Ошибка: ' + data.error, 'error', errorDebug, null, data.model || null);
                                return;
                            }

                            if (data.done) {
                                let modelName = null;
                                if (data.debug && data.debug.response && data.debug.response.model) {
                                    modelName = data.debug.response.model;
                                }
                                
                                if (data.usage) {
                                    const inputTokens = data.usage.input_tokens || 0;
                                    const outputTokens = data.usage.output_tokens || 0;
                                    const totalTokens = data.usage.total_tokens || (inputTokens + outputTokens);
                                    currentTotalInput += inputTokens;
                                    currentTotalOutput += outputTokens;
                                    currentTotalTokens += totalTokens;
                                    updateStats(currentTotalInput, currentTotalOutput, currentTotalTokens);
                                    
                                    const tokensDiv = document.createElement('div');
                                    tokensDiv.className = 'message-tokens';
                                    const tokensInfo = `вх: ${inputTokens} | вых: ${outputTokens} | всего: ${totalTokens}`;
                                    tokensDiv.textContent = modelName ? modelName + ' • ' + tokensInfo : tokensInfo;
                                    assistantDiv.appendChild(tokensDiv);
                                } else if (modelName) {
                                    const tokensDiv = document.createElement('div');
                                    tokensDiv.className = 'message-tokens';
                                    tokensDiv.textContent = modelName;
                                    assistantDiv.appendChild(tokensDiv);
                                }
                                messageContent.innerHTML = marked.parse(fullContent.trim());
                                
                                const plainContent = fullContent.replace(/<[^>]*>/g, '');
                                const copyBtn = document.createElement('button');
                                copyBtn.className = 'message-copy-btn';
                                copyBtn.textContent = '📋';
                                copyBtn.title = 'Копировать';
                                copyBtn.onclick = function() { copyMessage(this, 'assistant'); };
                                copyBtn.setAttribute('data-content', plainContent);
                                assistantDiv.appendChild(copyBtn);
                                
                                if (debugMode && data.debug) {
                                    const debugBtn = document.createElement('button');
                                    debugBtn.className = 'message-debug-btn';
                                    debugBtn.textContent = '🔍';
                                    debugBtn.title = 'Debug';
                                    debugBtn.onclick = function() { showDebugModal(data.debug); };
                                    assistantDiv.appendChild(debugBtn);
                                }
                                
                                chatMessages.scrollTop = chatMessages.scrollHeight;
                                saveUserSettings();
                            } else {
                                fullContent = data.content || '';
                                messageContent.innerHTML = marked.parse(fullContent.trim());
                                chatMessages.scrollTop = chatMessages.scrollHeight;
                            }
                        } catch (e) {
                            console.error('Parse error:', e);
                        }
                    }
                }
            }
        } catch (err) {
            messageInput.value = message;
            if (err.name === 'AbortError') {
                if (assistantDiv) assistantDiv.remove();
                addMessage('Запрос прерван', 'error');
                return;
            }
            if (assistantDiv) assistantDiv.remove();
            addMessage('Ошибка соединения: ' + err.message, 'error');
        }
    }

    function addMessage(content, role, debugData = null, usage = null, model = null) {
        const div = document.createElement('div');
        div.className = `message message-${role}`;
        
        let html = '';
        if (role === 'assistant') {
            html = `<div class="message-content">${marked.parse(content.trim())}</div>`;
        } else {
            html = `<div class="message-content">${escapeHtml(content)}</div>`;
        }
        
        if (role === 'assistant') {
            let tokensInfo = '';
            if (usage) {
                const inTokens = usage.input_tokens || 0;
                const outTokens = usage.output_tokens || 0;
                const totalTokens = usage.total_tokens || (inTokens + outTokens);
                tokensInfo = `вх: ${inTokens} | вых: ${outTokens} | всего: ${totalTokens}`;
            }
            if (tokensInfo || model) {
                html += `<div class="message-tokens">${model ? model + (tokensInfo ? ' • ' : '') : ''}${tokensInfo}</div>`;
            }
        }
        
        if (role === 'user' || role === 'assistant' || role === 'error') {
            const plainContent = role === 'assistant' ? content.replace(/<[^>]*>/g, '').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&').replace(/&quot;/g, '"') : content;
            const escapedContent = plainContent.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            html += `<button class="message-copy-btn" onclick="copyMessage(this, '${role}')" data-content="${escapedContent}" title="Копировать">📋</button>`;
        }
        
        if ((role === 'assistant' || role === 'error') && debugData) {
            if (debugData.request || debugData.response) {
                html += `<button class="message-debug-btn" onclick="showDebugModal(${escapeHtml(JSON.stringify(debugData)).replace(/"/g, '&quot;')})" title="Debug">🔍</button>`;
            }
        }
        
        div.innerHTML = html;
        
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function copyMessage(btn, role) {
        const content = btn.getAttribute('data-content') || '';
        const text = role === 'assistant' ? content.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&') : content;
        navigator.clipboard.writeText(text).then(() => {
            const original = btn.textContent;
            btn.textContent = '✓';
            setTimeout(() => btn.textContent = original, 1000);
        });
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML.replace(/\n/g, '<br>');
    }

    async function resetChat() {
        const sessionId = getSessionId();
        try {
            await fetch('/api/chat/reset', { 
                method: 'POST',
                headers: { 'X-Session-Id': sessionId }
            });
            chatMessages.innerHTML = `
                <div class="message message-system">
                    <div class="message-content">
                        Чат сброшен. Задайте новый вопрос.
                    </div>
                </div>
            `;
            updateStats(0, 0, 0);
        } catch (err) {
            alert('Ошибка сброса чата: ' + err.message);
        }
    }

    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            chatForm.dispatchEvent(new Event('submit'));
        }
    });

    loadProviders();
    loadMessages();
</script>
{% endblock %}
