<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T6 AI Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 class="logo">T6 UI</h1>
            <div class="header-controls">
                <button class="btn btn-small" onclick="openSettings()" title="Настройки">⚙️</button>
                <span id="status" class="status-dot" title="Проверка..."></span>
            </div>
        </div>
    </header>

    <script>
        function openSettings() {
            window.location.href = '/?settings=1';
        }

        document.addEventListener('click', function(e) {
            if (typeof isRequestInProgress !== 'undefined' && isRequestInProgress) {
                const link = e.target.closest('.nav-link');
                if (link) {
                    e.preventDefault();
                    alert('Дождитесь ответа перед переходом');
                }
            }
        });
    </script>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Configure marked
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: false,
            gfm: true
        });

        const STORAGE_KEY = 't6_session_id';

        function getSessionId() {
            return localStorage.getItem(STORAGE_KEY) || 'default';
        }

        function setSessionId(sessionId) {
            localStorage.setItem(STORAGE_KEY, sessionId);
            location.reload();
        }

        function switchSession(sessionId) {
            setSessionId(sessionId);
        }

        async function createNewSession() {
            const name = prompt('Введите имя новой сессии:', 'new-session');
            if (!name) return;
            
            setSessionId(name);
        }

        async function renameCurrentSession() {
            const currentSession = getSessionId();
            if (currentSession === 'default') {
                alert('Нельзя переименовать сессию default');
                return;
            }
            
            const newName = prompt('Введите новое имя сессии:', currentSession);
            if (!newName || newName === currentSession) return;
            
            try {
                const response = await fetch(`/api/sessions/${currentSession}/rename`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ new_name: newName })
                });
                
                if (response.ok) {
                    setSessionId(newName);
                } else {
                    const data = await response.json();
                    alert('Ошибка переименования: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                alert('Ошибка: ' + err.message);
            }
        }

        async function loadSessions() {
            try {
                const response = await fetch('/api/sessions');
                const data = await response.json();
                
                const select = document.getElementById('session-select');
                const currentSession = getSessionId();
                
                select.innerHTML = '';
                
                const sessions = data.sessions || [];
                sessions.forEach(session => {
                    const option = document.createElement('option');
                    option.value = session.session_id;
                    option.textContent = session.session_id;
                    if (session.session_id === currentSession) {
                        option.selected = true;
                    }
                    select.appendChild(option);
                });
                
                if (!sessions.find(s => s.session_id === currentSession)) {
                    const option = document.createElement('option');
                    option.value = currentSession;
                    option.textContent = currentSession;
                    option.selected = true;
                    select.appendChild(option);
                }
            } catch (e) {
                console.error('Failed to load sessions:', e);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            fetch('/api/health')
                .then(r => r.json())
                .then(data => {
                    const status = document.getElementById('status');
                    if (data.backend === 'connected') {
                        status.classList.add('connected');
                        status.title = 'Бэкенд подключён';
                    } else {
                        status.classList.add('disconnected');
                        status.title = 'Бэкенд отключён';
                    }
                })
                .catch(() => {
                    const status = document.getElementById('status');
                    status.classList.add('disconnected');
                    status.title = 'Бэкенд недоступен';
                });

            loadSessions();
        });
    </script>
</body>
</html>
