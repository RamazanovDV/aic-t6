{% extends "base.html" %}

{% block content %}
<div class="settings-container">
    <h2>Настройки</h2>

    <div class="settings-section">
        <h3>Подключение к бэкенду</h3>
        <div class="form-group">
            <label for="backend-url">URL бэкенда</label>
            <input type="text" id="backend-url" class="form-input" value="http://localhost:5000">
        </div>
        <div class="form-group">
            <label for="backend-api-key">API Key бэкенда</label>
            <input type="password" id="backend-api-key" class="form-input" value="your-secret-api-key">
        </div>
    </div>

    <div class="settings-section">
        <h3>Управление сессиями</h3>
        <p class="help-text">Сохранённые сессии загружаются автоматически. Выберите сессию в верхнем меню.</p>
        
        <div class="sessions-list" id="sessions-list">
            <div class="loading">Загрузка сессий...</div>
        </div>

        <div class="settings-actions" style="margin-top: 1rem;">
            <button class="btn btn-secondary" onclick="exportSessions()">Экспорт всех сессий</button>
            <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">Импорт сессий</button>
            <input type="file" id="import-file" accept=".json" style="display: none" onchange="importSessions(this)">
        </div>
    </div>

    <div class="settings-actions">
        <button class="btn btn-primary" onclick="saveSettings()">Сохранить настройки</button>
    </div>
</div>

<script>
    async function loadSessionsList() {
        const container = document.getElementById('sessions-list');
        try {
            const response = await fetch('/api/sessions');
            const data = await response.json();
            
            if (!data.sessions || data.sessions.length === 0) {
                container.innerHTML = '<p class="help-text">Нет сохранённых сессий</p>';
                return;
            }

            let html = '<div class="sessions-grid">';
            data.sessions.forEach(session => {
                const date = session.updated_at ? new Date(session.updated_at).toLocaleString('ru') : 'N/A';
                html += `
                    <div class="session-card">
                        <div class="session-name">${session.session_id}</div>
                        <div class="session-info">${session.message_count} сообщений</div>
                        <div class="session-date">${date}</div>
                        <div class="session-actions">
                            ${session.session_id !== 'default' ? `<button class="btn btn-small" onclick="renameSession('${session.session_id}')">Переименовать</button>` : ''}
                            ${session.session_id !== 'default' ? `<button class="btn btn-small" onclick="deleteSession('${session.session_id}')">Удалить</button>` : ''}
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        } catch (e) {
            container.innerHTML = '<p class="help-text">Не удалось загрузить сессии</p>';
        }
    }

    async function deleteSession(sessionId) {
        if (!confirm(`Удалить сессию "${sessionId}"?`)) return;
        
        try {
            const response = await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' });
            if (response.ok) {
                loadSessionsList();
                alert('Сессия удалена');
            } else {
                alert('Ошибка удаления сессии');
            }
        } catch (e) {
            alert('Ошибка: ' + e.message);
        }
    }

    async function renameSession(sessionId) {
        const newName = prompt('Введите новое имя сессии:', sessionId);
        if (!newName || newName === sessionId) return;
        
        try {
            const response = await fetch(`/api/sessions/${sessionId}/rename`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ new_name: newName })
            });
            
            if (response.ok) {
                loadSessionsList();
                alert('Сессия переименована');
            } else {
                const data = await response.json();
                alert('Ошибка переименования: ' + (data.error || 'Unknown error'));
            }
        } catch (e) {
            alert('Ошибка: ' + e.message);
        }
    }

    async function exportSessions() {
        try {
            const response = await fetch('/api/sessions/export', { method: 'POST' });
            const data = await response.json();
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 't6-sessions.json';
            a.click();
            URL.revokeObjectURL(url);
        } catch (e) {
            alert('Ошибка экспорта: ' + e.message);
        }
    }

    async function importSessions(input) {
        const file = input.files[0];
        if (!file) return;
        
        try {
            const text = await file.text();
            const data = JSON.parse(text);
            
            const response = await fetch('/api/sessions/import', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                alert('Сессии импортированы');
                loadSessionsList();
            } else {
                alert('Ошибка импорта');
            }
        } catch (e) {
            alert('Ошибка: ' + e.message);
        }
        
        input.value = '';
    }

    async function saveSettings() {
        const backendUrl = document.getElementById('backend-url').value;
        const backendApiKey = document.getElementById('backend-api-key').value;

        alert('Настройки сохранены (в памяти). Перезапустите UI для применения.');
    }

    document.addEventListener('DOMContentLoaded', loadSessionsList);
</script>

<style>
    .sessions-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1rem;
    }

    .session-card {
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1rem;
    }

    .session-name {
        font-weight: 600;
        margin-bottom: 0.5rem;
        word-break: break-all;
    }

    .session-info {
        font-size: 0.875rem;
        color: var(--text-secondary);
    }

    .session-date {
        font-size: 0.75rem;
        color: var(--text-secondary);
        margin-top: 0.25rem;
    }

    .session-actions {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.5rem;
    }

    .session-actions .btn {
        flex: 1;
    }

    .session-card .btn {
        margin-top: 0.5rem;
        width: 100%;
    }

    .loading {
        color: var(--text-secondary);
    }
</style>
{% endblock %}
